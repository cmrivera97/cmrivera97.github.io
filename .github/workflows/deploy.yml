name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # Derive the Pages URL + base path from the repo name so the same workflow is correct on
      # both the project site (jorius.github.io/portfolio-web-app-ciruela, base = /<repo>) and a
      # user/org site (cmrivera97.github.io, served at root, base = /).
      - name: Resolve site + base
        run: |
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          owner_lc="$(echo "$owner" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(echo "$repo" | tr '[:upper:]' '[:lower:]')"
          if [ "$repo_lc" = "${owner_lc}.github.io" ]; then
            echo "PORTFOLIO_SITE=https://${owner_lc}.github.io" >> "$GITHUB_ENV"
            echo "PORTFOLIO_BASE=/" >> "$GITHUB_ENV"
          else
            echo "PORTFOLIO_SITE=https://${owner_lc}.github.io" >> "$GITHUB_ENV"
            echo "PORTFOLIO_BASE=/${repo}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Switches the repo's Pages source to "GitHub Actions" on first run (legacy/Jekyll → workflow),
      # using the workflow's own token — no manual Settings change or admin API access needed.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
